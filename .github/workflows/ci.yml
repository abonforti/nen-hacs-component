name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wrap into custom_components structure
        run: |
          mkdir -p custom_components/nen
          find . -maxdepth 1 -not -name '.' -not -name 'custom_components' -not -name '.git' -not -name '.github' \
            | xargs -I{} cp -r {} custom_components/nen/
      - uses: home-assistant/actions/hassfest@master
